name: Deploy bisats-frontend (S3 + CloudFront)

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'

permissions:
  id-token: write   # REQUIRED for OIDC
  contents: read

jobs:
  deploy:
    name: Build and deploy frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_NODE_ENV: production
          REACT_APP_API_BASE_URL: ${{ secrets.REACT_APP_API_BASE_URL }}
          REACT_APP_GOOGLE_API_CLIENT_ID: ${{ secrets.REACT_APP_GOOGLE_API_CLIENT_ID }}
          REACT_APP_REDUX_SECRET: ${{ secrets.REACT_APP_REDUX_SECRET }}
          REACT_APP_TAWK_URL: ${{ secrets.REACT_APP_TAWK_URL }}
          REACT_APP_ZOHO_URL: ${{ secrets.REACT_APP_ZOHO_URL }}
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload to S3
        run: |
          aws s3 sync frontend/build s3://${{ secrets.S3_BUCKET_NAME }} --delete --exclude ".DS_Store" --exclude "**/.DS_Store"
          

      - name: CloudFront cache invalidation
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
